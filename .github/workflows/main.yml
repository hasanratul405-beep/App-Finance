name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip
          unzip -q gradle-8.3-bin.zip
          sudo mv gradle-8.3 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          /opt/gradle/bin/gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FinanceDashboard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
