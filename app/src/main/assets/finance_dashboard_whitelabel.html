*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;padding-bottom:56px;min-height:100vh;}
.page{max-width:680px;margin:0 auto;padding:0 14px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px;border-bottom:1px solid var(--b1);margin-bottom:16px;position:sticky;top:0;background:var(--bg);z-index:20;}

.bname{font-size:15px;font-weight:700;}

.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;background:var(--s1);padding:4px;border-radius:var(--r);margin-bottom:16px;}
.tb{padding:8px 0;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--t3);font-family:inherit;text-align:center;}
.tb.on{background:var(--s3);color:var(--t1);}
.sec{display:none;}.sec.on{display:block;}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px 14px;margin-bottom:10px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.mc{border-radius:var(--r);padding:10px 12px;}
.mc.d{background:var(--s1);}
.mc.g{background:var(--gbg);border:1px solid var(--gbr);}
.mc.b{background:var(--blbg);border:1px solid var(--blbr);}

.mc.r{background:var(--rbg);border:1px solid var(--rbr);}

.ml{font-size:10px;color:var(--t3);margin-bottom:2px;}

function safeConfirm(msg, onYes){
  var overlay=document.createElement('div');

}

// DEFAULT_FORMULAS, getFormulas(), saveFormulas(), resetFormulas() defined below

// Safe math parser — NO new Function(), NO eval — works on all iOS Safari
function evalFormula(expr, vars) {
  if(!expr || typeof expr !== 'string') return 0;
  try {
    // Step 1: substitute variable names with their numeric values
    var resolved = expr.replace(/[a-zA-Z_][a-zA-Z0-9_]*/g, function(name) {
      return vars.hasOwnProperty(name) ? String(Number(vars[name])||0) : '0';
    });
    // Step 2: validate — only digits, spaces, operators, dots, parens
    if(!/^[\d\s\+\-\*\/\.\(\)]+$/.test(resolved)) return 0;
    // Step 3: safe recursive descent parser (no eval, no Function)
    return _mathParse(resolved.replace(/\s/g,''));
  } catch(e) { return 0; }
}
// Minimal recursive descent math parser for + - * /
function _mathParse(s) {
  var pos = 0;
  function peek(){ return pos < s.length ? s[pos] : ''; }
  function consume(){ return s[pos++]; }
  function parseExpr() {
    var v = parseTerm();
    while(peek()==='+' || peek()==='-'){
      var op=consume(); var r=parseTerm();
      v = op==='+' ? v+r : v-r;
    }
    return v;
  }
  function parseTerm() {
    var v = parseFactor();
    while(peek()==='*' || peek()==='/'){
      var op=consume(); var r=parseFactor();
      v = op==='*' ? v*r : (r!==0?v/r:0);
    }
    return v;
  }
  function parseFactor() {
    if(peek()==='('){
      consume();
      var v=parseExpr();
      if(peek()===')') consume();
      return v;
    }
    if(peek()==='-'){ consume(); return -parseFactor(); }
    // Number
    var n='';
    while(peek()!=='' && /[\d.]/.test(peek())) n+=consume();
    return n ? Number(n) : 0;
  }
  var result = parseExpr();
  return isFinite(result) ? result : 0;
}

// Available variables: pool, income, extra, carry, lv,

// Single source of truth: formulas live in ST._formulas
function getFormulas(){
  var stored = ST && ST._formulas ? ST._formulas : null;
  if(!stored) return JSON.parse(JSON.stringify(DEFAULT_FORMULAS));
  var merged = JSON.parse(JSON.stringify(DEFAULT_FORMULAS));
  Object.keys(stored).forEach(function(k){ if(stored[k]) merged[k]=stored[k]; });
  return merged;
}

}

function getEffectiveRate(){
  // Returns the actual rate applied to USD (base + any incentive)
  var ex=getEx();
  var base=Number(ex.base||121);
  if(ex.mode==='pct') return base*(1+Number(ex.extra||0)/100);
  if(ex.mode==='fixed') return base+Number(ex.extra||0);
  return base; // mode 'none'
}
function bdt(u){return Math.round(u*getEffectiveRate());}
function safeLocale(n,locale){
  var v=Math.round(Math.abs(n));
  if(!locale)return v.toLocaleString();
  try{return v.toLocaleString(locale);}
  catch(e){return v.toLocaleString();}
}

function getSrc(){return ST._sources||DS;}
function getAcc(){return ST._accounts||DA;}
function initM(k){if(!ST[k])ST[k]={carry:0,received:{},sent:{},extra:0,lv:{},disc:{}};if(!ST[k].disc)ST[k].disc={};return ST[k];}

function getLvSum(k){
  var d=ST[k];if(!d||!d.lv)return 0;
  var t=0;Object.keys(d.lv).forEach(function(id){t+=Number(d.lv[id]||0);});
  return t;
}

// Two-pass calculation:
// Pass 1: compute base metrics using fixed accounts only
// Pass 2: resolve percentage accounts using base metrics
function calcM(k){
  var d=initM(k);var a=getAcc();
  var income=0;
  getSrc().forEach(function(x){
    if(d.received[x.id]){
      var disc=Number((d.disc&&d.disc[x.id])||0);
      income+=bdt(Math.max(0,x.usd-disc));
    }
  });
  var extra=Number(d.extra||0);
  var carry=Number(d.carry||0);
  var lv=getLvSum(k);
  var pool=income+extra+carry+lv;
  var leftover=carry+lv;  // Total leftover = carry + lv

  // Pass 1: fixed-only totals and base buffer
  var fixedAlloc=0;
  a.forEach(function(x){if((x.alloc||'fixed')==='fixed')fixedAlloc+=bdt(Number(x.fixed||0));});
  var baseBuffer=pool-fixedAlloc;

  // Base params for percentage calc
  var baseParams={
    income:income,extra:extra,carry:carry,lv:lv,
    buffer:baseBuffer,leftover:leftover,
    liquid:0,savings:0  // calculated after pass 1 sent
  };

  // Pass 2: resolve actual amount for each account
  var acctAmts={};
  a.forEach(function(x){
    var alloc=x.alloc||'fixed';
    if(alloc==='fixed'){
      acctAmts[x.id]=bdt(Number(x.fixed||0));
    } else if(alloc==='pct'){
      var base=baseParams[x.pct_param]||0;
      acctAmts[x.id]=Math.round(base*(Number(x.pct_val||0)/100));
    } else {
      acctAmts[x.id]=bdt(Number(x.fixed||0));
    }
  });

  var totalAlloc=0;
  a.forEach(function(x){totalAlloc+=acctAmts[x.id];});

  // Dynamic category-based sent totals
  var _calcCats=getCats();var _calcCatMap={};_calcCats.forEach(function(ct){_calcCatMap[ct.id]=ct;});
  var sentBycat={};_calcCats.forEach(function(ct){sentBycat[ct.id]=0;});
  var sentTotal=0;
  a.forEach(function(x){
    if(d.sent[x.id]){
      var amt=acctAmts[x.id];sentTotal+=amt;
      if(sentBycat[x.cat]!==undefined)sentBycat[x.cat]+=amt;
    }
  });
  // Liquid deduction = sum of all cats where liquidDeduct=true
  var sentLiqDeduct=0,sentSavings=0;
  _calcCats.forEach(function(ct){
    if(ct.liquidDeduct)sentLiqDeduct+=sentBycat[ct.id]||0;
    if(ct.savingsCount)sentSavings+=sentBycat[ct.id]||0;
  });
  var sentExpTotal=0;
  _calcCats.filter(function(ct){return ct.liquidDeduct&&!ct.savingsCount;}).forEach(function(ct){sentExpTotal+=sentBycat[ct.id]||0;});
  var sentDPS=sentBycat.dps||0;
  var sentFDR=sentBycat.fdr||0;

  // ── CLEAN LOGICAL FORMULAS ────────────────────────────────────────
  //
  // pool = income + extra + carry + lv  (all money available this month)
  //
  // TOTAL LIQUID = pool − expenses_sent − DPS_sent − FDR_sent
  //   Logic: your income minus what is gone (expenses) or locked (DPS/FDR).
  //   Savings accounts are NOT deducted — they are withdrawable anytime.
  //
  // TOTAL SAVINGS = pool − expenses_sent
  //   Logic: everything you did NOT spend on expenses = total wealth.
  //   Includes savings acc + DPS + FDR + buffer + whatever is still unsent.
  //
  // TOTAL LEFTOVER = carry + lv
  //   Logic: funds brought forward from last month (carry-over + expense leftovers).
  //
  // BUFFER = pool − totalAlloc
  //   Logic: honest surplus/deficit if all accounts are fully funded.
  //   Can be negative — this is the warning signal.

  // Evaluate using stored (possibly user-edited) formulas
  var _fml = getFormulas();
  var _vars = {
    pool:pool, income:income, extra:extra, carry:carry, lv:lv,
    sentExp:sentExpTotal, sentExpTotal:sentExpTotal, sentDPS:sentDPS, sentFDR:sentFDR,
    sentSavings:sentSavings, sentTotal:sentTotal, totalAlloc:totalAlloc,
    buffer:pool-totalAlloc
  };
  var buffer        = evalFormula(_fml.buffer,       _vars);
  var totalLeftover = evalFormula(_fml.totalLeftover, _vars);
  var liquid        = evalFormula(_fml.liquid,        _vars);
  var totalSavings  = evalFormula(_fml.totalSavings,  _vars);
  var remaining     = Math.max(0, pool - sentTotal);
  var distExact     = (sentTotal > 0 && sentTotal === totalAlloc);

  // If pool is zero, all derived boxes show 0
  if(pool === 0){
    liquid=0; totalSavings=0; totalLeftover=0; buffer=0; remaining=0;
  }

  return{
    income:income, extra:extra, carry:carry, lv:lv,
    pool:pool, leftover:carry+lv,
    totalAlloc:totalAlloc, acctAmts:acctAmts,
    sentTotal:sentTotal, sentExpTotal:sentExpTotal,
    sentDPS:sentDPS, sentFDR:sentFDR, sentSavings:sentSavings,
    remaining:remaining, buffer:buffer, shortfall:buffer,
    liquid:liquid, totalSavings:totalSavings, totalLeftover:totalLeftover,
    distExact:distExact
  };
}

function canSend(k,accId){
  var d=initM(k);if(d.sent[accId])return true;
  var r=calcM(k);var acc=null;
  getAcc().forEach(function(x){if(x.id===accId)acc=x;});
  if(!acc)return true;
  var amt=r.acctAmts[accId]||0;
  return (r.sentTotal+amt)<=r.pool;
}

function calcYear(y){
  var T={income:0,extra:0,carry:0,lv:0,pool:0,totalAlloc:0,
    sentTotal:0,sentExpTotal:0,sentDPS:0,sentFDR:0,sentSavings:0,
    buffer:0,liquid:0,totalSavings:0,totalLeftover:0,shortfallTotal:0};
  var a=getAcc();var aT={};a.forEach(function(x){aT[x.id]=0;});
  for(var m=0;m<12;m++){
    var k=mk(y,m);var r=calcM(k);
    T.income+=r.income;T.extra+=r.extra;T.carry+=r.carry;T.lv+=r.lv;
    T.pool+=r.pool;T.totalAlloc+=r.totalAlloc;
    T.sentTotal+=r.sentTotal;T.sentExpTotal+=r.sentExpTotal;
    T.sentDPS+=r.sentDPS;T.sentFDR+=r.sentFDR;T.sentSavings+=r.sentSavings;
    T.buffer+=r.buffer;T.liquid+=r.liquid;
    T.totalSavings+=r.totalSavings;T.totalLeftover+=r.totalLeftover;
    if(r.shortfall<0)T.shortfallTotal+=Math.abs(r.shortfall);
    a.forEach(function(x){if(ST[k]&&ST[k].sent&&ST[k].sent[x.id])aT[x.id]+=(r.acctAmts[x.id]||0);});
  }
  T.distExact=(T.sentTotal>0&&T.sentTotal===T.totalAlloc);
  T.aT=aT;
  return T;
}

      recv:r.income+r.extra,sent:r.sentTotal,

  }

}

}

          if(canvas._lastPinch){scale=Math.max(minScale,scale*(dist/canvas._lastPinch));}

    inp.value=curVal;

    // Autocomplete dropdown
    var acList=dv('ac-list');
    var acSelIdx=-1;

    function showAC(filter){
      acList.innerHTML='';acSelIdx=-1;
      var filtered=FML_PARAMS.filter(function(p){
        return !filter||p.v.toLowerCase().indexOf(filter.toLowerCase())===0;
      });
      if(!filtered.length){acList.style.display='none';return;}
      filtered.forEach(function(p,i){
        var item=dv('ac-item');
        var vSpan=el('span','ac-var',p.v);
        var dSpan=el('span','ac-desc',p.d);
        item.appendChild(vSpan);item.appendChild(dSpan);
        item.addEventListener('mousedown',function(e){
          e.preventDefault();
          var val=inp.value;
          var wordStart=val.search(/[a-zA-Z_]*$/);
          inp.value=val.slice(0,wordStart)+p.v;
          acList.style.display='none';
          inp.focus();
        });
        item.addEventListener('touchend',function(e){
          e.preventDefault();
          var val=inp.value;
          var wordStart=val.search(/[a-zA-Z_]*$/);
          inp.value=val.slice(0,wordStart)+p.v;
          acList.style.display='none';
          inp.focus();
        });
        acList.appendChild(item);
      });
      acList.style.display='block';
    }

    inp.addEventListener('input',function(){
      // Get the current partial word being typed
      var val=inp.value.slice(0,inp.selectionStart||inp.value.length);
      var match=val.match(/[a-zA-Z_]+$/);
      if(match&&match[0].length>=1){showAC(match[0]);}
      else{acList.style.display='none';}
    });
    inp.addEventListener('keydown',function(e){
      var items=acList.querySelectorAll('.ac-item');
      if(acList.style.display==='none'||!items.length)return;
      if(e.key==='ArrowDown'){e.preventDefault();acSelIdx=Math.min(acSelIdx+1,items.length-1);items.forEach(function(it,i){it.classList.toggle('sel',i===acSelIdx);});}
      else if(e.key==='ArrowUp'){e.preventDefault();acSelIdx=Math.max(acSelIdx-1,0);items.forEach(function(it,i){it.classList.toggle('sel',i===acSelIdx);});}
      else if(e.key==='Enter'&&acSelIdx>=0){e.preventDefault();items[acSelIdx].click();}
      else if(e.key==='Escape'){acList.style.display='none';}
    });
    inp.addEventListener('blur',function(){setTimeout(function(){acList.style.display='none';},150);});

    acWrap.appendChild(inp);acWrap.appendChild(acList);
    wrap.appendChild(lbl);wrap.appendChild(hint);wrap.appendChild(acWrap);
    return{wrap:wrap,inp:inp};
  }

// ── PDF GENERATION ──────────────────────────────────────────────────
function fmtPDF(n){ var wl=getWL(); return safeLocale(n,wl.locale)+(wl.currencyCode||''); }

function _runGenMonthlyPDF(){
  var jsPDF=window.jspdf?window.jspdf.jsPDF:null;
  if(!jsPDF){alert('PDF library failed to load. Please check your internet connection and try again.');return;}
  var doc=new jsPDF({unit:'mm',format:'a4'});
  var W=210,M=14,cw=W-M*2,y=M;
  var key=mk(VY,VM);var d=initM(key);
  var r=calcM(key);var a=getAcc();var s=getSrc();

  // Colors
  var NAVY=[13,27,42],BLUE=[59,110,240],GREEN=[52,201,125],
      RED=[240,80,80],AMBER=[240,160,48],TEAL=[0,200,200],
      GRAY=[80,80,95],LIGHT=[230,232,238],WHITE=[255,255,255],
      DARK=[26,31,46];

  function setColor(rgb,alpha){ doc.setTextColor(rgb[0],rgb[1],rgb[2]); }
  function rect(x,y,w,h,rgb,r2){
    doc.setFillColor(rgb[0],rgb[1],rgb[2]);
    if(r2){doc.roundedRect(x,y,w,h,r2,r2,'F');}
    else{doc.rect(x,y,w,h,'F');}
  }
  function line_(x1,y1,x2,y2,rgb){
    doc.setDrawColor(rgb[0],rgb[1],rgb[2]);doc.setLineWidth(0.3);
    doc.line(x1,y1,x2,y2);
  }

  // ── HEADER ──
  rect(0,0,W,18,NAVY);
  doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.setTextColor(255,255,255);
  doc.text((getWL().brandName||'Finance Dashboard').toUpperCase()+' — STATEMENT',M,8);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.setTextColor(160,180,210);
  doc.text(MN[VM]+' '+VY+' Monthly Report',M,13.5);
  doc.text('Generated '+new Date().toLocaleDateString(getWL().locale||'en-US'),W-M,13.5,{align:'right'});
  // Logo in top-right of header
  var _wlLogo=getWL().logoData;
  if(_wlLogo){try{doc.addImage(_wlLogo,'PNG',W-M-12,1.5,11,11);}catch(e){}}
  y=24;

  // ── SUMMARY BOXES ──
  var boxes=[
    {lbl:'Total Liquid',val:fmtPDF(r.liquid),col:TEAL,neg:r.liquid<0},
    {lbl:'Total Savings',val:fmtPDF(r.totalSavings),col:GREEN,neg:r.totalSavings<0},
    {lbl:'Income Received',val:fmtPDF(r.income+r.extra),col:BLUE,neg:false},
    {lbl:'Total Expenses',val:fmtPDF(r.sentExpTotal),col:RED,neg:false},
    {lbl:'Total Distributed',val:fmtPDF(r.sentTotal),col:r.distExact?GREEN:AMBER,neg:false},
    {lbl:'Monthly Buffer',val:(r.buffer<0?'-':'')+fmtPDF(r.buffer),col:r.buffer>=0?GREEN:RED,neg:r.buffer<0},
    {lbl:'Last Month Leftover',val:fmtPDF(r.totalLeftover),col:AMBER,neg:false},
    {lbl:'Remaining to Send',val:fmtPDF(r.remaining),col:BLUE,neg:false},
  ];
  var bw=(cw-6)/2,bh=14;
  for(var bi=0;bi<boxes.length;bi++){
    var bx=M+(bi%2)*(bw+6),by=y+Math.floor(bi/2)*(bh+3);
    var bc=boxes[bi].neg?RED:boxes[bi].col;
    // Light tinted background (90% white, 10% color)
    doc.setFillColor(bc[0]+(255-bc[0])*0.88, bc[1]+(255-bc[1])*0.88, bc[2]+(255-bc[2])*0.88);
    doc.roundedRect(bx,by,bw,bh,2,2,'F');
    // Colored border
    doc.setDrawColor(bc[0],bc[1],bc[2]);doc.setLineWidth(0.5);
    doc.roundedRect(bx,by,bw,bh,2,2,'S');
    // Label in color (clearly visible on light background)
    doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.setTextColor(bc[0],bc[1],bc[2]);
    doc.text(boxes[bi].lbl,bx+3,by+5);
    // Value in dark
    doc.setFontSize(11);doc.setFont('helvetica','bold');
    doc.setTextColor(DARK[0],DARK[1],DARK[2]);
    doc.text(boxes[bi].val,bx+3,by+11.5);
  }
  y+=Math.ceil(boxes.length/2)*(bh+3)+6;

  // ── INCOME SECTION ──
  function section(title,rows,cols,colW){
    if(y>265){doc.addPage();y=M;}
    rect(M,y,cw,7,NAVY,2);
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
    doc.text(title,M+3,y+4.8);
    y+=9;
    // header
    doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(GRAY[0],GRAY[1],GRAY[2]);
    var cx=M;
    cols.forEach(function(col,i){doc.text(col,cx+1,y+3.5);cx+=colW[i];});
    y+=6;line_(M,y,M+cw,y,LIGHT);y+=1;
    // rows
    rows.forEach(function(row,ri){
      if(y>272){doc.addPage();y=M;}
      var bg=ri%2===0?[248,249,252]:[255,255,255];
      rect(M,y,cw,6,bg);
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(DARK[0],DARK[1],DARK[2]);
      var cx2=M;
      row.forEach(function(cell,ci){
        var align=cell.align||'left';
        var col=cell.color||null;
        if(col)doc.setTextColor(col[0],col[1],col[2]);
        else doc.setTextColor(DARK[0],DARK[1],DARK[2]);
        var tx=align==='right'?cx2+colW[ci]-2:cx2+1;
        doc.text(String(cell.v||cell),tx,y+4.2,{align:align});
        cx2+=colW[ci];
      });
      y+=6;line_(M,y,M+cw,y,LIGHT);
    });
    y+=4;
  }

  // SEO
  var seoRows=[];
  s.filter(function(x){return x.type==='seo';}).sort(function(a,b){return a.day-b.day;}).forEach(function(x){
    var on=!!d.received[x.id];
    var _disc=Number((d.disc&&d.disc[x.id])||0);
    var _effUsd=Math.max(0,x.usd-_disc);
    seoRows.push([
      {v:x.name+(on&&_disc>0?' (-$'+_disc+')':'')},{v:x.day+'th'},{v:'$'+x.usd+(_disc>0?' -$'+_disc:'')},
      {v:fmtPDF(bdt(_effUsd))},{v:on?'Received':'Pending',color:on?GREEN:AMBER,align:'right'}
    ]);
  });
  section(getWL().stream1Label.toUpperCase()+' PROJECTS',seoRows,['Project','Day','USD',getWL().currencyCode,'Status'],[70,15,18,30,cw-133]);

  // Maint
  var maintRows=[];
  s.filter(function(x){return x.type==='maint';}).sort(function(a,b){return a.day-b.day;}).forEach(function(x){
    var on=!!d.received[x.id];
    var _disc2=Number((d.disc&&d.disc[x.id])||0);
    var _effUsd2=Math.max(0,x.usd-_disc2);
    maintRows.push([
      {v:x.name},{v:x.day+'th'},{v:'$'+x.usd+(_disc2>0?' -$'+_disc2:'')},
      {v:fmtPDF(bdt(_effUsd2))},{v:on?'Received':'Pending',color:on?GREEN:AMBER,align:'right'}
    ]);
  });
  section(getWL().stream2Label.toUpperCase()+' PROJECTS',maintRows,['Project','Day','USD',getWL().currencyCode,'Status'],[70,15,18,30,cw-133]);

  // Distribution
  var _pdfCatArr=getCats();var _pdfCatMap={};
  _pdfCatArr.forEach(function(ct){_pdfCatMap[ct.id]={label:ct.label,rgb:hexToRGB(ct.color)||GRAY};});
  function hexToRGB(hex){if(!hex||hex[0]!=='#')return null;hex=hex.replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];return[parseInt(hex.substr(0,2),16),parseInt(hex.substr(2,2),16),parseInt(hex.substr(4,2),16)];}
  var distRows=[];
  a.forEach(function(x){
    var amt=r.acctAmts[x.id]||0;var sent2=!!d.sent[x.id];
    var cInfo=_pdfCatMap[x.cat]||{label:x.cat,rgb:GRAY};
    distRows.push([
      {v:x.name},
      {v:cInfo.label,color:cInfo.rgb},
      {v:fmtPDF(amt),align:'right'},
      {v:sent2?'Sent':'Pending',color:sent2?GREEN:AMBER,align:'right'}
    ]);
  });
  section('DISTRIBUTION',distRows,['Account','Category','Amount','Status'],[80,28,45,cw-153]);

  // Leftover entries
  var expA2=a.filter(function(x){return x.cat==='expense'||x.cat==='debt';});
  var lvRows=[];
  expA2.forEach(function(x){
    var stored=Number((d.lv&&d.lv[x.id])||0);
    lvRows.push([{v:x.name},{v:fmtPDF(r.acctAmts[x.id]||0)},{v:stored>0?fmtPDF(stored):'—',color:stored>0?GREEN:GRAY,align:'right'}]);
  });
  section('LAST MONTH LEFTOVERS',lvRows,['Expense Account','Budget','Leftover Entered'],[80,53,cw-133]);

  // Footer on each page
  var totalPages=doc.getNumberOfPages();
  for(var pi=1;pi<=totalPages;pi++){
    doc.setPage(pi);
    rect(0,287,W,10,NAVY);

function _runGenYearlyPDF(){
  var jsPDF=window.jspdf?window.jspdf.jsPDF:null;

  doc.text('Year '+yr+' Annual Report',M,13.5);

  var _wlLogoY=getWL().logoData;
  if(_wlLogoY){try{doc.addImage(_wlLogoY,'PNG',W-M-12,1.5,11,11);}catch(e){}}
  y=24;

  // Summary boxes
  var boxes=[
    {lbl:'Total Liquid',val:fmtPDF(r.liquid),col:TEAL,neg:r.liquid<0},
    {lbl:'Total Savings',val:fmtPDF(r.totalSavings),col:GREEN,neg:r.totalSavings<0},
    {lbl:'Total Income',val:fmtPDF(r.income+r.extra),col:BLUE,neg:false},
    {lbl:'Total Expenses',val:fmtPDF(r.sentExpTotal),col:RED,neg:false},
    {lbl:'Total Distributed',val:fmtPDF(r.sentTotal),col:r.distExact?GREEN:AMBER,neg:false},
    {lbl:'Annual Buffer',val:(r.buffer<0?'-':'')+fmtPDF(r.buffer),col:r.buffer>=0?GREEN:RED,neg:r.buffer<0},
    {lbl:'Total Leftover',val:fmtPDF(r.totalLeftover),col:AMBER,neg:false},
    {lbl:'Total Shortfall',val:fmtPDF(r.shortfallTotal),col:r.shortfallTotal>0?RED:GREEN,neg:false},
  ];
  var bw=(cw-6)/2,bh=14;
  for(var bi=0;bi<boxes.length;bi++){
    var bx=M+(bi%2)*(bw+6),by=y+Math.floor(bi/2)*(bh+3);
    var bc=boxes[bi].neg?RED:boxes[bi].col;
    // Light tinted background (90% white, 10% color)
    doc.setFillColor(bc[0]+(255-bc[0])*0.88, bc[1]+(255-bc[1])*0.88, bc[2]+(255-bc[2])*0.88);
    doc.roundedRect(bx,by,bw,bh,2,2,'F');
    // Colored border
    doc.setDrawColor(bc[0],bc[1],bc[2]);doc.setLineWidth(0.5);
    doc.roundedRect(bx,by,bw,bh,2,2,'S');
    // Label in color (clearly visible on light background)
    doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.setTextColor(bc[0],bc[1],bc[2]);
    doc.text(boxes[bi].lbl,bx+3,by+5);
    // Value in dark
    doc.setFontSize(11);doc.setFont('helvetica','bold');
    doc.setTextColor(DARK[0],DARK[1],DARK[2]);
    doc.text(boxes[bi].val,bx+3,by+11.5);
  }
  y+=Math.ceil(boxes.length/2)*(bh+3)+6;

  // Month by month table
  rect(M,y,cw,7,NAVY,2);
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('MONTH BY MONTH BREAKDOWN — '+yr,M+3,y+4.8);
  y+=9;
  // header row
  doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(GRAY[0],GRAY[1],GRAY[2]);
  var hcols=['Month','Income','Expenses','Distributed','Buffer','Liquid','Savings'];
  var hws=[22,28,28,30,24,24,cw-156];
  var hx=M;
  hcols.forEach(function(h,i){doc.text(h,hx+1,y+3.5);hx+=hws[i];});
  y+=6;doc.setDrawColor(LIGHT[0],LIGHT[1],LIGHT[2]);doc.setLineWidth(0.3);doc.line(M,y,M+cw,y);y+=1;

  for(var m=0;m<12;m++){
    if(y>272){doc.addPage();y=M;}
    var k=mk(yr,m);var mr=calcM(k);
    var bg=m%2===0?[248,249,252]:[255,255,255];
    doc.setFillColor(bg[0],bg[1],bg[2]);doc.rect(M,y,cw,6,'F');
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    var vals=[
      {v:MN[m],c:DARK},
      {v:fmtPDF(mr.income+mr.extra),c:BLUE,r:true},
      {v:fmtPDF(mr.sentExpTotal),c:RED,r:true},
      {v:fmtPDF(mr.sentTotal),c:mr.distExact?GREEN:DARK,r:true},
      {v:(mr.buffer<0?'-':'')+fmtPDF(mr.buffer),c:mr.buffer>=0?GREEN:RED,r:true},
      {v:fmtPDF(mr.liquid),c:mr.liquid>=0?TEAL:RED,r:true},
      {v:fmtPDF(mr.totalSavings),c:mr.totalSavings>=0?GREEN:RED,r:true},
    ];
    var vx=M;
    vals.forEach(function(v,i){
      doc.setTextColor(v.c[0],v.c[1],v.c[2]);
      var tx=v.r?(vx+hws[i]-2):vx+1;
      doc.text(v.v,tx,y+4.2,{align:v.r?'right':'left'});
      vx+=hws[i];
    });
    y+=6;doc.setDrawColor(LIGHT[0],LIGHT[1],LIGHT[2]);doc.setLineWidth(0.2);doc.line(M,y,M+cw,y);
  }
  y+=5;

  // Per account table
  if(y>240){doc.addPage();y=M;}
  rect(M,y,cw,7,NAVY,2);
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('PER ACCOUNT — TOTAL SENT IN '+yr,M+3,y+4.8);
  y+=9;
  var _yCatArrP=getCats();var _yCatMapP={};
  function hexToRGBY(hex){if(!hex||hex[0]!=='#')return null;hex=hex.replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];return[parseInt(hex.substr(0,2),16),parseInt(hex.substr(2,2),16),parseInt(hex.substr(4,2),16)];}
  _yCatArrP.forEach(function(ct){_yCatMapP[ct.id]={label:ct.label,rgb:hexToRGBY(ct.color)||GRAY};});
  a.forEach(function(x,ri){
    if(y>272){doc.addPage();y=M;}
    var bg=ri%2===0?[248,249,252]:[255,255,255];
    doc.setFillColor(bg[0],bg[1],bg[2]);doc.rect(M,y,cw,6,'F');
    var cInfoY=_yCatMapP[x.cat]||{label:x.cat,rgb:GRAY};var cc=cInfoY.rgb;
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.setTextColor(DARK[0],DARK[1],DARK[2]);doc.text(x.name,M+1,y+4.2);
    doc.setTextColor(cc[0],cc[1],cc[2]);doc.text(cInfoY.label,M+90,y+4.2);
    var tot=r.aT[x.id]||0;
    doc.setTextColor(tot>0?GREEN[0]:GRAY[0],tot>0?GREEN[1]:GRAY[1],tot>0?GREEN[2]:GRAY[2]);
    doc.text(fmtPDF(tot),M+cw-2,y+4.2,{align:'right'});
    y+=6;doc.setDrawColor(LIGHT[0],LIGHT[1],LIGHT[2]);doc.setLineWidth(0.2);doc.line(M,y,M+cw,y);
  });

  // Footer
  var totalPages=doc.getNumberOfPages();
  for(var pi=1;pi<=totalPages;pi++){
    doc.setPage(pi);
    doc.setFillColor(NAVY[0],NAVY[1],NAVY[2]);doc.rect(0,287,W,10,'F');
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(160,180,210);
    doc.text(getWL().pdfFooter||getWL().brandName,M,293);
    doc.text('Page '+pi+' of '+totalPages,W-M,293,{align:'right'});
  }

  doc.save('Statement_Yearly_'+yr+'.pdf');
}


// Lazy-load jsPDF on demand — avoids blocking app init on iOS
function _loadJsPDF(cb){
  if(window.jspdf){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload=function(){cb();};
  s.onerror=function(){alert('Could not load PDF library. Please check your internet connection.');};
  document.head.appendChild(s);
}
function genMonthlyPDF(){_loadJsPDF(function(){_runGenMonthlyPDF();});}
function genYearlyPDF(){_loadJsPDF(function(){_runGenYearlyPDF();});}

// Tab switching
function switchTab(tab){
  document.querySelectorAll('.tb').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-t')===tab);});
  document.querySelectorAll('.sec').forEach(function(s){s.classList.toggle('on',s.id==='t-'+tab);});
  if(tab==='monthly')rMonthly();
  else if(tab==='yearly')rYearly();
  else rSettings();
}
document.querySelectorAll('.tb').forEach(function(b){
  b.addEventListener('click',function(){switchTab(b.getAttribute('data-t'));});
});

// ── NATIVE ANDROID BRIDGE ────────────────────────────────────────
// Called by the APK when user accepts a transaction card
window.applyNativeAction = function(actionJson) {
  try {
    var act = typeof actionJson === 'string' ? JSON.parse(actionJson) : actionJson;
    if (!act || act.action !== 'ACCEPT') return;

    var key = mk(VY, VM);
    initM(key);

    // If matched to a distribution account, mark it as sent
    if (act.acctId) {
      ST[key].sent[act.acctId] = true;
      sS(ST);
    }

    // If credit type, try to match to a project and mark received
    if (act.type === 'credit' && act.amount > 0) {
      var matched = null;
      var bestDiff = Infinity;
      getSrc().forEach(function(src) {
        var expected = bdt(src.usd);
        var diff = Math.abs(act.amount - expected) / expected;
        if (diff < 0.05 && diff < bestDiff) {
          bestDiff = diff;
          matched = src;
        }
      });
      if (matched) {
        ST[key].received[matched.id] = true;
        sS(ST);
      }
    }

    // Refresh current tab
    var activeTab = document.querySelector('.tb.on');
    if (activeTab) switchTab(activeTab.getAttribute('data-t'));

    // Show a brief toast-style confirmation
    var toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);' +
      'background:#34c97d;color:#0a0a0f;padding:10px 20px;border-radius:100px;' +
      'font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;' +
      'box-shadow:0 4px 20px rgba(52,201,125,.4);';
    toast.textContent = 'Transaction applied to ' + (act.acctName || 'account');
    document.body.appendChild(toast);
    setTimeout(function() { if(toast.parentNode) toast.parentNode.removeChild(toast); }, 2500);

  } catch(e) { console.error('applyNativeAction error:', e); }
};

// Sync account digits to native layer whenever accounts are saved
function syncDigitsToNative() {
  if (!window.NativeBridge) return;
  try {
    var accts = getAcc();
    var digits = accts
      .filter(function(a) { return a.acctDigits; })
      .map(function(a) { return { id: a.id, name: a.name, digits: a.acctDigits }; });
    NativeBridge.syncAccountDigits(JSON.stringify(digits));
    // Also sync currency symbol
    NativeBridge.saveCurrencySymbol(C());
  } catch(e) {}
}

// Hook into saveWL to sync currency when branding is saved
var _origSaveWL = saveWL;
saveWL = function(obj) {
  _origSaveWL(obj);
  syncDigitsToNative();
};

// Hook into sS to sync account digits whenever state saves
var _origSS = sS;
sS = function(state) {
  _origSS(state);
  syncDigitsToNative();
};


// Use DOMContentLoaded — fires as soon as HTML is parsed, no waiting for external resources
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',function(){applyWLToDOM();switchTab('monthly');});
} else {
  applyWLToDOM();switchTab('monthly');
}
